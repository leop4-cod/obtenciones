<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
    <h:head>
        <title>OBTENCIONES VEGETALES - SENADI</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' />
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap');

            * { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                font-family: 'Poppins', sans-serif;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background-color: #0a0a0a;
                position: relative;
            }

            /* ========== CAROUSEL DE FONDO ========== */
            .bg-carousel {
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                z-index: 1;
            }
            .bg-slide {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                opacity: 0;
                transition: opacity 1.5s ease-in-out;
            }
            .bg-slide.active { opacity: 1; }

            /* ========== CONTENEDOR CENTRADO ========== */
            .login-container {
                width: 100vw; height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
                position: fixed;
                top: 0; left: 0;
                z-index: 2;
            }

            /* ========== TARJETA ESTILO LAGO (Glass puro) ========== */
            .login-card {
                width: 100%;
                max-width: 420px;
                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(16px) saturate(140%);
                -webkit-backdrop-filter: blur(16px) saturate(140%);
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 20px;
                padding: 38px 35px;
                text-align: center;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15),
                            inset 0 0 80px rgba(255, 255, 255, 0.03);
                animation: cardEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            }
            @keyframes cardEntrance {
                from { opacity: 0; transform: translateY(30px) scale(0.97); }
                to   { opacity: 1; transform: translateY(0) scale(1); }
            }

            /* ========== LOGO ========== */
            .logo-wrap {
                margin-bottom: 20px;
            }
            .logo {
                max-width: 180px;
                height: auto;
                object-fit: contain;
                filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
            }

            /* ========== TÍTULO ========== */
            .login-title {
                color: #ffffff;
                font-size: 1.4rem;
                font-weight: 600;
                margin-bottom: 25px;
                letter-spacing: 0.5px;
                text-shadow: 0 2px 10px rgba(0,0,0,0.4);
                line-height: 1.4;
            }

            /* ========== FORMULARIO ========== */
            .form-group {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            /* ========== INPUTS CÁPSULA (estilo lago) ========== */
            .input-group {
                position: relative;
                display: flex;
                align-items: center;
            }

            /* El ícono va a la DERECHA */
            .input-group i {
                position: absolute;
                right: 18px;
                color: rgba(255, 255, 255, 0.7);
                font-size: 1.3rem;
                z-index: 3;
                pointer-events: none;
            }

            .input-group input,
            .input-group input[type="text"],
            .input-group input[type="password"] {
                width: 100% !important;
                background: rgba(255, 255, 255, 0.08) !important;
                border: 1.5px solid rgba(255, 255, 255, 0.35) !important;
                border-radius: 30px !important;
                padding: 11px 50px 11px 20px !important;
                color: #ffffff !important;
                font-size: 0.95rem !important;
                font-family: 'Poppins', sans-serif !important;
                font-weight: 400 !important;
                box-shadow: none !important;
                outline: none !important;
                height: auto !important;
                transition: all 0.3s ease !important;
                letter-spacing: 0.3px;
            }
            .input-group input:focus {
                border-color: rgba(255, 255, 255, 0.7) !important;
                background: rgba(255, 255, 255, 0.14) !important;
                box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08) !important;
            }
            .input-group input::placeholder {
                color: rgba(255, 255, 255, 0.6);
                font-weight: 400;
            }

            /* Fix autofill */
            input:-webkit-autofill,
            input:-webkit-autofill:hover,
            input:-webkit-autofill:focus,
            input:-webkit-autofill:active {
                -webkit-box-shadow: 0 0 0 30px rgba(255, 255, 255, 0.1) inset !important;
                -webkit-text-fill-color: white !important;
                transition: background-color 5000s ease-in-out 0s;
                border-radius: 30px !important;
            }

            /* ========== BOTÓN BLANCO (estilo lago) ========== */
            .btn-login,
            .btn-login.ui-button {
                margin-top: 12px !important;
                width: 100% !important;
                background-color: #ffffff !important;
                background-image: none !important;
                color: #1a1a2e !important;
                border: none !important;
                padding: 12px !important;
                font-size: 1rem !important;
                font-weight: 600 !important;
                font-family: 'Poppins', sans-serif !important;
                border-radius: 30px !important;
                cursor: pointer !important;
                letter-spacing: 1px !important;
                text-transform: uppercase;
                text-shadow: none !important;
                box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important;
                transition: all 0.3s ease !important;
            }
            .btn-login:hover,
            .btn-login.ui-button:hover {
                background-color: rgba(255, 255, 255, 0.9) !important;
                box-shadow: 0 6px 20px rgba(0,0,0,0.25) !important;
                transform: translateY(-1px);
            }
            .btn-login:active { transform: translateY(1px) !important; }
            .btn-login .ui-button-text {
                color: #1a1a2e !important;
                font-weight: 600 !important;
                font-size: 1rem !important;
                padding: 0 !important;
                font-family: 'Poppins', sans-serif !important;
            }

            /* ========== GROWL ========== */
            .ui-growl { z-index: 9999 !important; }
            .ui-growl-item-container {
                background: rgba(15, 23, 42, 0.9) !important;
                border: 1px solid rgba(255, 255, 255, 0.1) !important;
                backdrop-filter: blur(8px) !important;
                border-radius: 12px !important;
            }
            .ui-growl-title { color: #ffffff !important; font-weight: bold !important; }
            .ui-growl-message p { color: #cbd5e1 !important; }

            /* Limpiar PrimeFaces */
            .ui-panel, .ui-panel-content {
                border: none !important;
                background: transparent !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* ========== RESPONSIVE ========== */
            @media (max-width: 520px) {
                .login-card {
                    padding: 35px 25px;
                    max-width: 95%;
                }
                .login-title { font-size: 1.1rem; }
            }
        </style>
    </h:head>
    <h:body>
        <p:growl id="mensajes" showDetail="true" life="2000" />

        <!-- Carrusel de fondo -->
        <div class="bg-carousel" id="bg-carousel"></div>

        <!-- Login centrado -->
        <main class="login-container">
            <div class="login-card">

                <!-- Logo -->
                <div class="logo-wrap">
                    <h:graphicImage styleClass="logo" value="#{resource['images:iepi.png']}" />
                </div>

                <!-- Título -->
                <h1 class="login-title">GESTIÓN DE OBTENCIONES VEGETALES</h1>

                <!-- Formulario -->
                <h:form id="formlog">
                    <p:panel id="panelin">
                        <div class="form-group">
                            <div class="input-group">
                                <h:inputText id="icon_usuario" value="#{loginBean.login}" required="true" pt:placeholder="Usuario" />
                                <i class='bx bx-user'></i>
                            </div>

                            <div class="input-group">
                                <h:inputSecret id="icon_password" value="#{loginBean.clave}" required="true" pt:placeholder="Contraseña" />
                                <i class='bx bx-lock-alt'></i>
                            </div>

                            <p:commandButton id="loginButton" value="INGRESAR"
                                             actionListener="#{loginBean.logueo}" update=":mensajes"
                                             oncomplete="manejarLogin(xhr, status, args)"
                                             styleClass="btn-login" />
                        </div>
                    </p:panel>
                </h:form>
            </div>
        </main>

        <script>
            //<![CDATA[
            document.addEventListener('DOMContentLoaded', function() {
                var bgCarousel = document.getElementById('bg-carousel');

                var contextPath = window.location.pathname.substring(0, window.location.pathname.indexOf('/', 1));
                if (!contextPath || contextPath === '') {
                    contextPath = '/adminobtencion';
                }

                var images = [
                    contextPath + '/img/bg1.jpg',
                    contextPath + '/img/bg2.jpg',
                    contextPath + '/img/bg3.jpg',
                    contextPath + '/img/bg4.jpg'
                ];

                var loaded = 0;
                images.forEach(function(imgSrc, index) {
                    var img = new Image();
                    img.onload = function() {
                        loaded++;
                        var div = document.createElement('div');
                        div.classList.add('bg-slide');
                        div.style.backgroundImage = "url('" + imgSrc + "')";
                        div.setAttribute('data-index', index);
                        if (index === 0) div.classList.add('active');
                        bgCarousel.appendChild(div);
                        if (loaded === images.length) iniciarCarrusel();
                    };
                    img.onerror = function() {
                        console.warn('No se pudo cargar: ' + imgSrc);
                        loaded++;
                        if (loaded === images.length) iniciarCarrusel();
                    };
                    img.src = imgSrc;
                });

                function iniciarCarrusel() {
                    var slides = document.querySelectorAll('.bg-slide');
                    if (slides.length === 0) return;

                    var sortedSlides = Array.from(slides).sort(function(a, b) {
                        return parseInt(a.getAttribute('data-index')) - parseInt(b.getAttribute('data-index'));
                    });

                    sortedSlides.forEach(function(s, i) {
                        if (i === 0) s.classList.add('active');
                        else s.classList.remove('active');
                    });

                    var currentIndex = 0;
                    setInterval(function() {
                        sortedSlides[currentIndex].classList.remove('active');
                        currentIndex = (currentIndex + 1) % sortedSlides.length;
                        sortedSlides[currentIndex].classList.add('active');
                    }, 5000);
                }
            });

            function manejarLogin(xhr, status, args) {
                if (!args.validationFailed && args.estaLogeado) {
                    setTimeout(function() {
                        window.location = args.view;
                    }, 500);
                }
            }
            //]]>
        </script>
    </h:body>
</html>
