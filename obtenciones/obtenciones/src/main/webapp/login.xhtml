<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>OBTENCIONES VEGETALES</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://cdnjs.cloudflare.com"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" media="print" onload="this.media='all'"/>
        <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/></noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.3/css/materialize.min.css" media="print" onload="this.media='all'"/>
        <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.3/css/materialize.min.css"/></noscript>

        <link rel="stylesheet" type="text/css" href="#{resource['assets/css/style.css']}" />
        <link rel="stylesheet" type="text/css" href="#{resource['assets/css/main.css']}" />
        <!--<link href="resources/assets/css/style.css" rel="stylesheet" />-->

        <link rel="shortcut icon" type="image/png" href="#{resource['images/favicon.png']}"/>

        <style>
            /* Estilo global del Body con centrado y tema oscuro */
            body {
                min-height: 100vh;
                margin: 0;
                display: flex !important;
                justify-content: center;
                align-items: center;
                background-color: #04080e !important;
                position: relative;
                overflow: hidden;
                font-family: 'Nunito Sans', sans-serif;
            }
            
            /* Blobs brillantes de fondo (Tema SENADI - Verde esmeralda vegetal y colores de Ecuador) */
            .bg-glow {
                position: absolute;
                border-radius: 50%;
                filter: blur(130px);
                opacity: 0.25;
                z-index: 0;
                pointer-events: none;
            }
            .bg-glow-1 {
                width: 550px;
                height: 550px;
                background: radial-gradient(circle, #10b981 0%, rgba(16,185,129,0) 70%); /* Verde Esmeralda (SENADI Vegetal) */
                top: -15%;
                left: -15%;
                animation: float-blob-1 28s infinite alternate ease-in-out;
            }
            .bg-glow-2 {
                width: 600px;
                height: 600px;
                background: radial-gradient(circle, #eab308 0%, rgba(234,179,8,0) 70%); /* Amarillo Ecuatoriano */
                bottom: -20%;
                right: -10%;
                animation: float-blob-2 32s infinite alternate ease-in-out;
            }
            .bg-glow-3 {
                width: 450px;
                height: 450px;
                background: radial-gradient(circle, #0284c7 0%, rgba(2,132,199,0) 70%); /* Azul Ecuatoriano */
                top: 25%;
                right: 5%;
                animation: float-blob-3 24s infinite alternate ease-in-out;
            }
            .bg-glow-4 {
                width: 480px;
                height: 480px;
                background: radial-gradient(circle, #ef4444 0%, rgba(239,68,68,0) 70%); /* Rojo Ecuatoriano */
                bottom: 10%;
                left: 10%;
                animation: float-blob-4 26s infinite alternate ease-in-out;
            }

            @keyframes float-blob-1 {
                0% { transform: translate(0, 0) scale(1); }
                33% { transform: translate(80px, 60px) scale(1.1); }
                66% { transform: translate(-30px, 100px) scale(0.95); }
                100% { transform: translate(0, 0) scale(1); }
            }
            @keyframes float-blob-2 {
                0% { transform: translate(0, 0) scale(1); }
                33% { transform: translate(-70px, -90px) scale(0.9); }
                66% { transform: translate(50px, -30px) scale(1.08); }
                100% { transform: translate(0, 0) scale(1); }
            }
            @keyframes float-blob-3 {
                0% { transform: translate(0, 0) scale(1); }
                50% { transform: translate(-80px, 60px) scale(1.05); }
                100% { transform: translate(0, 0) scale(1); }
            }
            @keyframes float-blob-4 {
                0% { transform: translate(0, 0) scale(1); }
                33% { transform: translate(60px, -70px) scale(0.95); }
                66% { transform: translate(-50px, 40px) scale(1.08); }
                100% { transform: translate(0, 0) scale(1); }
            }

            /* Grid tecnológica sutil de fondo */
            .bg-grid {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
                background-size: 30px 30px;
                z-index: 1;
                pointer-events: none;
            }

            /* Hojas/Partículas orgánicas flotantes (Obtenciones Vegetales) */
            .particles-container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                z-index: 2;
                pointer-events: none;
            }
            .particle {
                position: absolute;
                bottom: -30px;
                background: linear-gradient(135deg, rgba(16, 185, 129, 0.3) 0%, rgba(5, 150, 105, 0.05) 100%);
                border-radius: 50% 0; /* Forma de hoja/semilla */
                transform: rotate(-45deg);
                animation: float-up 18s infinite linear;
                pointer-events: none;
                filter: drop-shadow(0 0 6px rgba(16, 185, 129, 0.15));
            }
            /* Diferentes tamaños, posiciones y retrasos para naturalidad */
            .p1 { left: 8%; width: 16px; height: 16px; animation-duration: 22s; animation-delay: 0s; }
            .p2 { left: 22%; width: 12px; height: 12px; animation-duration: 28s; animation-delay: 3s; background: linear-gradient(135deg, rgba(234, 179, 8, 0.25) 0%, rgba(234, 179, 8, 0.05) 100%); filter: drop-shadow(0 0 6px rgba(234, 179, 8, 0.1)); } /* Amarillo */
            .p3 { left: 35%; width: 20px; height: 20px; animation-duration: 32s; animation-delay: 7s; }
            .p4 { left: 50%; width: 14px; height: 14px; animation-duration: 26s; animation-delay: 1.5s; background: linear-gradient(135deg, rgba(2, 132, 199, 0.25) 0%, rgba(2, 132, 199, 0.05) 100%); filter: drop-shadow(0 0 6px rgba(2, 132, 199, 0.1)); } /* Azul */
            .p5 { left: 68%; width: 18px; height: 18px; animation-duration: 30s; animation-delay: 9s; }
            .p6 { left: 82%; width: 12px; height: 12px; animation-duration: 24s; animation-delay: 4s; }
            .p7 { left: 15%; width: 22px; height: 22px; animation-duration: 35s; animation-delay: 12s; background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.05) 100%); filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.1)); } /* Rojo */
            .p8 { left: 90%; width: 15px; height: 15px; animation-duration: 25s; animation-delay: 6s; }

            @keyframes float-up {
                0% {
                    transform: translateY(0) translateX(0) rotate(-45deg) scale(0.7);
                    opacity: 0;
                }
                25% {
                    transform: translateY(-30vh) translateX(15px) rotate(-15deg) scale(0.85);
                    opacity: 0.7;
                }
                50% {
                    transform: translateY(-60vh) translateX(-15px) rotate(15deg) scale(1);
                    opacity: 0.7;
                }
                75% {
                    transform: translateY(-90vh) translateX(10px) rotate(45deg) scale(1.15);
                    opacity: 0.7;
                }
                100% {
                    transform: translateY(-120vh) translateX(-10px) rotate(90deg) scale(1.3);
                    opacity: 0;
                }
            }

            /* Contenedor del Formulario */
            #formlog {
                margin: 0 !important;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                z-index: 10;
            }

            /* Panel de Login Glassmorphism Premium con animación de entrada */
            #formlog .ui-panel {
                background: rgba(10, 17, 28, 0.72) !important;
                border: 1px solid rgba(255, 255, 255, 0.08) !important;
                border-radius: 18px !important;
                backdrop-filter: blur(20px) saturate(180%) !important;
                -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45) !important;
                width: 320px !important;
                padding: 20px 25px !important;
                text-align: center !important;
                opacity: 0;
                transform: translateY(25px);
                transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease !important;
            }
            body.loaded #formlog .ui-panel {
                opacity: 1;
                transform: translateY(0);
            }
            #formlog .ui-panel:hover {
                border-color: rgba(16, 185, 129, 0.3) !important;
                transform: translateY(-2px) !important;
                box-shadow: 0 22px 55px rgba(16, 185, 129, 0.12), 0 20px 50px rgba(0, 0, 0, 0.45) !important;
            }
            #formlog .ui-panel-content {
                padding: 0 !important;
            }

            /* Textos */
            #formlog p {
                color: #ffffff !important;
                font-weight: 800 !important;
                font-size: 13px !important;
                letter-spacing: 0.8px !important;
                margin-top: 10px !important;
                margin-bottom: 25px !important;
                text-shadow: 0 1px 3px rgba(0,0,0,0.3);
                font-family: 'Nunito Sans', sans-serif;
            }
            #formlog label {
                color: #cbd5e1 !important;
                font-size: 13px;
                font-weight: 600;
            }
            #formlog input[type="text"], 
            #formlog input[type="password"] {
                color: #ffffff !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.3) !important;
                font-weight: 600;
                font-size: 14px;
            }
            #formlog input[type="text"]:focus, 
            #formlog input[type="password"]:focus {
                border-bottom: 1px solid #10b981 !important;
                box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15) !important;
            }
            .material-icons.prefix {
                color: #cbd5e1;
                transition: color 0.25s ease;
            }
            
            /* Corrección para Autocompletado (Autofill) del Navegador */
            #formlog input:-webkit-autofill,
            #formlog input:-webkit-autofill:hover, 
            #formlog input:-webkit-autofill:focus, 
            #formlog input:-webkit-autofill:active {
                -webkit-box-shadow: 0 0 0 30px #0a111c inset !important;
                -webkit-text-fill-color: #ffffff !important;
                caret-color: #ffffff !important;
                transition: background-color 5000s ease-in-out 0s !important;
            }
            
            /* Botón Ingresar */
            #formlog .btn_peque {
                background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
                border: none !important;
                border-radius: 8px !important;
                color: #ffffff !important;
                font-weight: 800 !important;
                font-size: 13px !important;
                box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3) !important;
                transition: all 0.25s ease !important;
                width: 100% !important;
                height: auto !important;
                letter-spacing: 1px !important;
                padding: 12px 10px !important;
            }
            #formlog .btn_peque:hover {
                background: linear-gradient(135deg, #34d399 0%, #10b981 100%) !important;
                box-shadow: 0 6px 20px rgba(16, 185, 129, 0.45) !important;
                transform: translateY(-1.5px) !important;
            }
            #formlog .btn_peque:active {
                transform: translateY(0.5px) !important;
            }
            #formlog .ui-button-text {
                color: #ffffff !important;
                font-weight: 800 !important;
            }

            /* Manual de Usuario */
            .manual-link {
                margin-top: 15px;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.6) !important;
                text-shadow: 0 1px 2px rgba(0,0,0,0.5);
                position: relative;
                z-index: 10;
                text-align: center;
            }
            .manual-link a {
                color: #34d399 !important;
                font-weight: 700;
                text-decoration: none;
                transition: color 0.2s;
            }
            .manual-link a:hover {
                color: #6ee7b7 !important;
                text-decoration: underline;
            }
            
            /* Notificaciones (Growl) */
            .ui-growl-item-container {
                background: rgba(15, 23, 42, 0.9) !important;
                border: 1px solid rgba(255, 255, 255, 0.1) !important;
                backdrop-filter: blur(8px) !important;
                border-radius: 12px !important;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
            }
            .ui-growl-title {
                color: #ffffff !important;
                font-weight: bold !important;
                letter-spacing: 0.5px;
            }
            .ui-growl-message p {
                color: #cbd5e1 !important;
                font-size: 13px;
            }

            /* Estilos y efectos del Logotipo para fondo oscuro */
            .logo-container {
                padding: 10px 0 20px 0;
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
            }
            .logo-filtered {
                filter: brightness(0) invert(1);
                opacity: 0.85;
                transition: opacity 0.3s ease, transform 0.3s ease;
                width: 100%;
            }
            .logo-filtered:hover {
                opacity: 1;
                transform: scale(1.02);
            }
        </style>
    </h:head>
    <h:body>
        <!-- Glowing background blobs -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-glow bg-glow-3"></div>
        <div class="bg-glow bg-glow-4"></div>
        
        <!-- Technology grid overlay -->
        <div class="bg-grid"></div>

        <!-- Floating organic particles (seeds/leaves of innovation) -->
        <div class="particles-container">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <div class="particle p5"></div>
            <div class="particle p6"></div>
            <div class="particle p7"></div>
            <div class="particle p8"></div>
        </div>
        <!-- Start Page Loading -->
        <div id="loader-wrapper">
            <div id="loader"></div>
            <div class="loader-section section-left"></div>
            <div class="loader-section section-right"></div>
        </div>
        <p:growl id="mensajes" showDetail="true" life="2000" />

        <h:form id="formlog">
            <p:panel id="panelin">

                <div class="logo-container">
                    <h:graphicImage styleClass="logo-filtered" value="#{resource['images:iepi.png']}" />
                </div>

                <p>GESTIÓN DE OBTENCIONES VEGETALES</p>
                <div class="input-field col s6">
                    <i class="material-icons prefix" id="account">account_circle</i>
                    <h:inputText id="icon_usuario" class="validate"
                                 onfocus="animaOnFocus('lbl_usuario', 'account')"
                                 onblur="animaOnBlur(this, 'lbl_usuario', 'account')"
                                 onchange="animaOnChange(this, 'lbl_usuario', 'account')"
                                 value="#{loginBean.login}" required="true"
                                 label="Usuario" />
                    <label id="lbl_usuario" for="icon_usuario"
                           onclick="animaOnClick(this, 'icon_usuario', 'account')">Usuario</label>
                </div>

                <div class="input-field col s6">
                    <i id="phoneicon" class="material-icons prefix">lock</i>
                    <label id="lbl_password" class="" for="icon_password"
                           onclick="animaOnClick(this, 'icon_password', 'phoneicon')">Password</label>
                    <h:inputSecret id="icon_password" class="validate"
                                   onfocus="animaOnFocus('lbl_password', 'phoneicon')"
                                   onblur="animaOnBlur(this, 'lbl_password', 'phoneicon')"
                                   value="#{loginBean.clave}" required="true"
                                   label="Password"/>
                </div>

                <p:commandButton id="loginButton" value="INGRESAR"
                                 actionListener="#{loginBean.logueo}" update=":mensajes"
                                 oncomplete="manejarLogin(xhr, status, args)"
                                 class="btn_peque">
                    <!--<p:effect rendered="{loginBean.shake}" for="panel" type="shake" event="click" /> -->
                </p:commandButton>

            </p:panel>
            <div class="manual-link">Manual de Usuario. Click
                <a target="_blank" href="http://www.derechosintelectuales.gob.ec">Aquí</a>
            </div>
        </h:form>


    </h:body>
    <script type="text/javascript">
        $(document).ready(function () {
            setTimeout(function () {
                $('body').addClass('loaded');
                $('h1').css('color', '#222222');
                var doc = document.forms['formlog'];
                var indexUs = getIdIndex('icon_usuario');
                if (doc[indexUs].value != '') {
                    logu = document.getElementById('account');
                    logu.style = 'color: rgb(16, 185, 129) !important;';
                    us = document.getElementById('lbl_usuario');
                    us.className = "active";
                }

                var indexPa = getIdIndex('icon_password');
                if (doc[indexPa].value != '') {
                    logu = document.getElementById('phoneicon');
                    logu.style = 'color: rgb(16, 185, 129) !important;';
                    us = document.getElementById('lbl_password');
                    us.className = "active";
                }
            }, 1200);
        });

        function getIdIndex(idName) {
            var doc = document.forms['formlog'];
            var i;
            var idResult = 0;
            for (i = 0; doc.length > i; i++) {
                if (doc[i].id.includes(idName)) {
                    idResult = i;
                    break;
                }
            }
            return idResult;
        }

        function animaOnClick(label, input, ima) {
            label.className = "active";
            var doc = document.forms['formlog'];
            var indexEspecificar = getIdIndex(input);
            doc[indexEspecificar].focus();
            user = document.getElementById(ima);
            user.style = 'color: rgb(16, 185, 129) !important;';
        }

        function animaOnFocus(label, ima) {
            iconLabel = document.getElementById(label);
            iconLabel.className = "active";
            user = document.getElementById(ima);
            user.style = 'color: rgb(16, 185, 129) !important;';
        }

        function animaOnBlur(inputtext, label, ima) {
            iconLabel = document.getElementById(label);
            user = document.getElementById(ima);
            if (inputtext.value == "") {
                iconLabel.className = "";
                user.style = 'color: rgb(203, 213, 225) !important;';
            } else {
                iconLabel.className = "active";
                user.style = 'color: rgb(16, 185, 129) !important;';
            }
        }

        function animaOnChange(inputtext, label, ima) {
            iconLabel = document.getElementById(label);
            user = document.getElementById(ima);
            if (inputtext.value == "") {
                iconLabel.className = "";
                user.style = 'color: rgb(203, 213, 225) !important;';
            } else {
                iconLabel.className = "active";
                user.style = 'color: rgb(16, 185, 129) !important;';
            }
        }

        function validar(e) {
            tecla = (document.all) ? e.keyCode : e.which;
            if (tecla == 8)
                return true;
            patron = /[A-Za-z\s]/;
            te = String.fromCharCode(tecla);
            return patron.test(te);
        }
        //<![CDATA[
        function manejarLogin(xhr, status, args) {
            if (!args.validationFailed && args.estaLogeado) {
                setTimeout(function () {
                    window.location = args.view;
                }, 500);
            } else {
                jQuery('#formlog').effect("shake", {times: 3}, 500);
            }
        }
        //]]>
    </script>
</html>
